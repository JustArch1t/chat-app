<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --text-light: #e2e8f0; --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; position: fixed; }
        #box { width: 95vw; max-width: 380px; height: 80vh; background: var(--glass-bg); backdrop-filter: blur(0.5px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-header h3 { font-size: 1.1rem; font-weight: 600; color: #ffffff; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; padding: 8px 12px; border-radius: 12px; }
        .msg-wrapper.self { align-self: flex-end; background: rgba(0, 120, 255, 0.3); border-bottom-right-radius: 2px; }
        .msg-wrapper.other { align-self: flex-start; background: rgba(0, 0, 0, 0.3); border-bottom-left-radius: 2px; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.75rem; font-weight: bold; }
        .actions { display: flex; gap: 8px; margin-left: 20px; }
        .btn-small { border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 0.8rem; }
        .delete-btn { background: rgba(255, 77, 77, 0.25); color: #ff4d4d; }
        .edit-btn { background: rgba(255, 255, 255, 0.25); color: #ffffff; }
        .bubble { font-size: 0.9rem; word-break: break-word; }
        .edit-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #fff; color: #fff; padding: 4px; border-radius: 4px; }
        #in { padding: 12px; background: rgba(0, 0, 0, 0.2); }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 10px; border-radius: 20px; outline: none; width: 100%; }
        #u { width: 70px; text-align: center; font-weight: bold; }
        #emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 8px; background: rgba(0,0,0,0.3); }
        .emoji-item { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header"><h3>Worldwide Group-Chat</h3></div>
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <div class="input-row">
            <input type="text" id="u" placeholder="Name" maxlength="10">
            <button class="emoji-btn" onclick="togglePicker()">😊</button>
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "chat-room-e8152.firebaseapp.com",
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-south1.firebasedatabase.app",
        projectId: "chat-room-e8152",
        storageBucket: "chat-room-e8152.firebasestorage.app",
        messagingSenderId: "875122406489",
        appId: "1:875122406489:web:c0f66c7a7903b9e87eed48"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    
    // Maintain a constant identity for this session
    const myIdentity = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myIdentity;

    // --- UI LOGIC ---
    const picker = document.getElementById('emoji-picker');
    ['😀', '😂', '😍', '😭', '💀', '👍', '🔥', '❤️', '😎', '😅'].forEach(e => {
        const span = document.createElement('span');
        span.className = 'emoji-item'; span.innerText = e;
        span.onclick = () => { document.getElementById('m').value += e; };
        picker.appendChild(span);
    });

    function togglePicker() { picker.style.display = (picker.style.display === 'grid') ? 'none' : 'grid'; }

    // --- CLOUD LOGIC ---
    document.getElementById("sendBtn").onclick = () => {
        const u = document.getElementById("u").value.trim();
        const m = document.getElementById("m").value.trim();
        if(!m) return;
        db.push({ user: u, text: m, timestamp: Date.now() });
        document.getElementById("m").value = "";
    };

    db.on('child_added', (snapshot) => {
        const data = snapshot.val();
        renderBubble(snapshot.key, data.user, data.text);
    });

    db.on('child_changed', (snapshot) => {
        const el = document.querySelector(`#msg-${snapshot.key} .bubble`);
        if(el) el.innerText = snapshot.val().text;
    });

    db.on('child_removed', (snapshot) => {
        document.getElementById(`msg-${snapshot.key}`)?.remove();
    });

    function renderBubble(id, user, text) {
        const isSelf = (user === myIdentity);
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${isSelf ? 'self' : 'other'}`;
        wrapper.id = `msg-${id}`;
        wrapper.innerHTML = `
            <div class="user-header"><span>${user}</span>
            ${isSelf ? `<div class="actions"><button class="btn-small edit-btn" onclick="editBubble('${id}')">✎</button><button class="btn-small delete-btn" onclick="db.child('${id}').remove()">×</button></div>` : ''}
            </div>
            <div class="bubble">${text}</div>`;
        document.getElementById("msg").appendChild(wrapper);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    }

    function editBubble(id) {
        const el = document.querySelector(`#msg-${id} .bubble`);
        el.innerHTML = `<input type="text" class="edit-input" value="${el.innerText}" onkeydown="if(event.key==='Enter') db.child('${id}').update({text: this.value})">`;
    }
</script>
</body>
</html>
