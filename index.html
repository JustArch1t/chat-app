<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group-Chat</title>
    <style>
        :root {
            --text-light: #e2e8f0;
            --glass-bg: rgba(15, 23, 42, 0.35);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glow-color: rgba(255, 255, 255, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            /* Solid color matching your image shadows + contains it perfectly on desktop */
            background: #04080e url('background.jpg') no-repeat center center fixed;
            background-size: contain;
            
            /* High-Fidelity Rendering Filters to prevent pixel blurring */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            
            color: var(--text-light);
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 12px;
        }

        /* If user is viewing on a mobile device, use cover instead so it fills the screen perfectly */
        @media (max-width: 768px) {
            body {
                background-size: cover;
            }
        }

        #box {
            width: 100%; max-width: 440px; height: 85vh; 
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; display: flex; flex-direction: column; overflow: hidden;
            border: 2px solid var(--glass-border); 
            box-shadow: 0 0 25px var(--glow-color), inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .chat-header {
            padding: 20px 24px 10px 24px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-header h3 { font-size: 1.25rem; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }

        #msg { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; padding: 10px 16px; border-radius: 18px; }
        
        .msg-wrapper.self { 
            align-self: flex-end; 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom-right-radius: 4px; 
        }
        
        .msg-wrapper.other { 
            align-self: flex-start; 
            background: rgba(0, 0, 0, 0.25); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px; 
        }

        .user-header { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 4px; font-size: 0.75rem; font-weight: bold; }
        .bubble { font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; word-break: break-word; color: #ffffff; }

        .delete-btn {
            background: transparent; border: none; color: #ff6b6b; font-size: 0.75rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; text-shadow: 0 0 4px #ff6b6b; }

        #in { padding: 16px 20px 20px 20px; display: flex; gap: 10px; align-items: center; background: rgba(0, 0, 0, 0.15); }
        
        .input-container {
            position: relative; flex-grow: 1; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px;
        }
        
        input {
            background: transparent; border: none; color: white; padding: 12px 40px 12px 16px; outline: none; font-size: 0.95rem; width: 100%;
        }
        #u { width: 80px; text-align: center; font-weight: bold; padding-right: 8px; }

        .attachment-icon {
            position: absolute; right: 16px; color: rgba(255, 255, 255, 0.4); font-size: 1rem; pointer-events: none;
        }

        button.send-btn {
            background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 6px; transition: transform 0.1s;
        }
        button.send-btn:active { transform: scale(0.9); }
        button.send-btn svg { fill: rgba(255, 255, 255, 0.75); width: 22px; height: 22px; transition: fill 0.2s; }
        button.send-btn:hover svg { fill: #ffffff; filter: drop-shadow(0 0 4px rgba(255,255,255,0.4)); }

        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">
        <h3>Group-Chat</h3>
    </div>
    <div id="msg"></div>
    <div id="in">
        <div class="input-container" style="width: 80px; flex-grow: 0;">
            <input type="text" id="u" placeholder="Name" value="User1" maxlength="10">
        </div>
        <div class="input-container">
            <input type="text" id="m" placeholder="Type a message..." autocomplete="off">
            <span class="attachment-icon">📎</span>
        </div>
        <button class="send-btn" onclick="s()">
            <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    let syncChannel;
    try { syncChannel = new BroadcastChannel('vercel_neon_group_chat'); } catch(e) {}
    
    const msgContainer = document.getElementById("msg");
    const mInput = document.getElementById("m");
    const uInput = document.getElementById("u");

    mInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); s(); }
    });

    function getUserColor(username) {
        const structuralColors = ['#ffffff', '#e2e8f0', '#cbd5e1', '#94a3b8', '#f8fafc', '#f1f5f9'];
        let hash = 0;
        for (let i = 0; i < username.length; i++) { hash = username.charCodeAt(i) + ((hash << 5) - hash); }
        return structuralColors[Math.abs(hash) % structuralColors.length];
    }

    function renderBubble(id, user, text, referenceUser) {
        const isSelf = (user === referenceUser);
        const nameColor = getUserColor(user);
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${isSelf ? 'self' : 'other'}`;
        wrapper.id = `msg-${id}`;
        wrapper.innerHTML = `
            <div class="user-header">
                <span style="color: ${nameColor}">${escapeHtml(user)}</span>
                <button class="delete-btn" onclick="removeBubble('${id}')">Delete</button>
            </div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        msgContainer.appendChild(wrapper);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    if (syncChannel) {
        syncChannel.onmessage = (e) => {
            const packet = e.data;
            if (packet.action === 'send') { renderBubble(packet.id, packet.user, packet.text, uInput.value.trim()); }
            else if (packet.action === 'delete') { const el = document.getElementById(`msg-${packet.id}`); if (el) el.remove(); }
        };
    }

    function s() {
        const u = uInput.value.trim() || "Guest";
        const m = mInput.value.trim();
        if(!m) return;
        const uniqueId = Date.now() + Math.random().toString(36).substr(2, 5);
        renderBubble(uniqueId, u, m, u);
        if (syncChannel) { syncChannel.postMessage({ action: 'send', id: uniqueId, user: u, text: m }); }
        mInput.value = "";
    }

    function removeBubble(id) {
        const el = document.getElementById(`msg-${id}`);
        if (el) el.remove();
        if (syncChannel) { syncChannel.postMessage({ action: 'delete', id: id }); }
    }

    function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
</script>
</body>
</html>
