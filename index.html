<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #04080e; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        #box { width: 95vw; max-width: 400px; height: 90vh; background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--border); color: white; font-weight: bold; text-align: center; }
        
        #msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { max-width: 80%; padding: 10px; border-radius: 12px; color: white; background: rgba(255,255,255,0.1); align-self: flex-start; }
        .self { align-self: flex-end; background: rgba(0, 120, 255, 0.5); }
        
        .actions { display: flex; gap: 8px; margin-top: 5px; justify-content: flex-end; }
        .btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }

        #in { padding: 10px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border); }
        .controls { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        #u { width: 80px; padding: 8px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .msg-area { display: flex; align-items: center; gap: 5px; }
        #m { flex: 1; padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button { padding: 10px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; }

        #emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 5px; background: #222; }
        .emoji { cursor: pointer; font-size: 1.2rem; text-align: center; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">Group Chat</div>
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <div class="controls">
            <input type="text" id="u" value="User1" maxlength="10">
            <button onclick="document.getElementById('emoji-picker').style.display = (document.getElementById('emoji-picker').style.display === 'grid' ? 'none' : 'grid')">😊</button>
        </div>
        <div class="msg-area">
            <input type="text" id="m" placeholder="Message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<script>
    const picker = document.getElementById('emoji-picker');
    const emojis = ['😀', '😂', '😍', '😭', '💀', '👍', '🔥', '❤️', '😢', '😎', '😅', '🤣', '😇', '🙃', '🥰', '🤩', '🤪', '👊', '🤟', '👌'];
    emojis.forEach(e => {
        const div = document.createElement('div');
        div.className = 'emoji'; div.innerText = e;
        div.onclick = () => { document.getElementById('m').value += e; };
        picker.appendChild(div);
    });

    function send() {
        const u = document.getElementById('u').value;
        const m = document.getElementById('m').value;
        if(!m.trim()) return;
        const div = document.createElement('div');
        div.className = 'msg-wrapper self';
        div.innerHTML = `<div><b>${u}:</b> ${m}</div>
            <div class="actions">
                <button class="btn" onclick="edit(this)">✎</button>
                <button class="btn" onclick="this.parentElement.parentElement.remove()">×</button>
            </div>`;
        document.getElementById('msg').appendChild(div);
        document.getElementById('msg').scrollTop = document.getElementById('msg').scrollHeight;
        document.getElementById('m').value = '';
    }

    function edit(btn) {
        const msgDiv = btn.parentElement.parentElement.querySelector('div');
        const oldText = msgDiv.innerText.split(': ')[1];
        const newText = prompt("Edit message:", oldText);
        if(newText) msgDiv.innerHTML = `<b>${document.getElementById('u').value}:</b> ${newText}`;
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('m').onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
