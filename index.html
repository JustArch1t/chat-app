<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <style>
        :root {
            --text-light: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.08); 
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: #04080e url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-light);
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }

        #box {
            width: 95vw; max-width: 380px; height: 80vh; 
            background: var(--glass-bg);
            backdrop-filter: blur(0.5px); -webkit-backdrop-filter: blur(0.5px);
            border-radius: 20px; display: flex; flex-direction: column; 
            overflow: hidden; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .chat-header {
            padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-header h3 { font-size: 1.1rem; font-weight: 600; color: #ffffff; }

        #msg { 
            flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
            -webkit-overflow-scrolling: touch; 
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; padding: 8px 12px; border-radius: 12px; }
        
        .msg-wrapper.self { 
            align-self: flex-end; background: rgba(255, 255, 255, 0.15); border-bottom-right-radius: 2px; 
        }
        
        .msg-wrapper.other { 
            align-self: flex-start; background: rgba(0, 0, 0, 0.3); border-bottom-left-radius: 2px; 
        }

        .user-header { display: flex; justify-content: space-between; margin-bottom: 2px; font-size: 0.7rem; font-weight: bold; }
        .bubble { font-size: 0.9rem; line-height: 1.3; white-space: pre-wrap; word-break: break-word; color: #ffffff; }

        .delete-btn {
            background: transparent; border: none; color: #ff9999; font-size: 0.7rem; cursor: pointer; opacity: 0.6;
        }

        #in { padding: 12px; display: flex; gap: 8px; align-items: center; background: rgba(0, 0, 0, 0.2); }
        
        .input-container {
            position: relative; flex-grow: 1; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
        }
        
        input {
            background: transparent; border: none; color: white; padding: 10px 30px 10px 12px; outline: none; font-size: 0.9rem; width: 100%;
        }
        #u { width: 70px; text-align: center; font-weight: bold; }

        button.send-btn { background: transparent; border: none; padding: 5px; }
        button.send-btn svg { fill: #ffffff; width: 20px; height: 20px; }

        #msg::-webkit-scrollbar { width: 3px; }
        #msg::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header"><h3>Group-Chat</h3></div>
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" value="User1" maxlength="10">
        <div class="input-container">
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
        </div>
        <button class="send-btn" onclick="s()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    let syncChannel;
    try { syncChannel = new BroadcastChannel('vercel_neon_group_chat'); } catch(e) {}
    
    const msgContainer = document.getElementById("msg");
    const mInput = document.getElementById("m");
    const uInput = document.getElementById("u");

    mInput.addEventListener("keydown", (e) => { if (e.key === "Enter") s(); });

    function renderBubble(id, user, text, referenceUser) {
        const isSelf = (user === referenceUser);
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${isSelf ? 'self' : 'other'}`;
        wrapper.id = `msg-${id}`;
        wrapper.innerHTML = `
            <div class="user-header"><span>${escapeHtml(user)}</span><button class="delete-btn" onclick="removeBubble('${id}')">X</button></div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        msgContainer.appendChild(wrapper);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    if (syncChannel) {
        syncChannel.onmessage = (e) => {
            if (e.data.action === 'send') renderBubble(e.data.id, e.data.user, e.data.text, uInput.value.trim());
            else if (e.data.action === 'delete') { const el = document.getElementById(`msg-${e.data.id}`); if (el) el.remove(); }
        };
    }

    function s() {
        const u = uInput.value.trim() || "Guest", m = mInput.value.trim();
        if(!m) return;
        const id = Date.now() + Math
