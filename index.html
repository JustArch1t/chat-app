<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body { 
            font-family: sans-serif; 
            background: #04080e url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            height: 100vh;
            margin: 0;
        }
        #box { 
            width: 100%; 
            max-width: 500px; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex;
            flex-direction: column;
        }
        #msg { flex-grow: 1; overflow-y: auto; border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px; margin-bottom: 10px; }
        .msg-wrapper { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .bubble { display: inline-block; margin-right: 10px; }
        #in { display: flex; gap: 10px; }
        #emoji-picker { display: none; margin-bottom: 10px; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        .emoji-item { cursor: pointer; font-size: 1.2rem; text-align: center; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px; }
        button { cursor: pointer; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" style="width: 80px;">
        <button onclick="document.getElementById('emoji-picker').style.display = (document.getElementById('emoji-picker').style.display === 'grid' ? 'none' : 'grid')">😊</button>
        <input type="text" id="m" placeholder="Message..." style="flex-grow:1;">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
            authDomain: "chat-room-e8152.firebaseapp.com",
            databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chat-room-e8152",
            storageBucket: "chat-room-e8152.firebasestorage.app",
            messagingSenderId: "875122406489",
            appId: "1:875122406489:web:c0f66c7a7903b9e87eed48"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');
        const myId = "User-" + Math.floor(Math.random() * 1000);
        document.getElementById("u").value = myId;

        // Send function
        function send() {
            const m = document.getElementById("m").value.trim();
            if(m) {
                db.push({ user: document.getElementById("u").value, text: m });
                document.getElementById("m").value = "";
            }
        }
        document.getElementById("sendBtn").onclick = send;
        document.getElementById("m").onkeypress = (e) => { if(e.key === 'Enter') send(); };
