<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group-Chat</title>
    <style>
        :root {
            --bg-dark: #0d0e15;
            --bg-panel: #161925;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --text-light: #e2e8f0;
            --border-neon: #1f2438;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-light);
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 12px;
        }

        #box {
            width: 100%; max-width: 650px; height: 85vh; background: var(--bg-panel);
            border-radius: 14px; display: flex; flex-direction: column; overflow: hidden;
            border: 2px solid var(--border-neon); box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
        }

        .chat-header {
            padding: 18px 20px; background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--border-neon); display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h3 { font-size: 1.2rem; font-weight: 700; color: var(--neon-blue); text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
        .live-tag { font-size: 0.8rem; color: var(--neon-green); text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); font-weight: 600; }

        #msg { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; padding: 8px 14px; border-radius: 12px; background: #202438; border: 1px solid rgba(255, 255, 255, 0.05); }
        .msg-wrapper.self { align-self: flex-end; border-right: 3px solid var(--neon-blue); }
        .msg-wrapper.other { align-self: flex-start; border-left: 3px solid var(--neon-pink); }

        .user-header { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 4px; font-size: 0.8rem; font-weight: bold; }
        .bubble { font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; word-break: break-word; color: #f8fafc; }

        .delete-btn {
            background: transparent; border: none; color: #ef4444; font-size: 0.75rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; text-shadow: 0 0 4px #ef4444; }

        #in { padding: 16px; background: rgba(0, 0, 0, 0.4); border-top: 2px solid var(--border-neon); display: flex; gap: 10px; }
        input {
            background: #0d0e15; border: 1px solid var(--border-neon); color: white; padding: 12px 16px; border-radius: 8px; outline: none; font-size: 0.95rem; transition: border 0.2s;
            width: 100%;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
        #u { width: 90px; text-align: center; color: var(--neon-green); font-weight: bold; }
        #m { flex-grow: 1; }

        button.send-btn {
            background: var(--neon-blue); color: #0d0e15; border: none; padding: 12px 22px; border-radius: 8px; font-weight: 700; cursor: pointer; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); transition: transform 0.1s, box-shadow 0.2s;
        }
        button.send-btn:hover { box-shadow: 0 0 15px rgba(0, 240, 255, 0.6); }
        button.send-btn:active { transform: scale(0.97); }

        #msg::-webkit-scrollbar { width: 5px; }
        #msg::-webkit-scrollbar-thumb { background: var(--border-neon); border-radius: 4px; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">
        <h3>⚡ Group-Chat</h3>
        <div class="live-tag">● VERCEL LIVE</div>
    </div>
    
    <div id="msg"></div>
    
    <div id="in">
        <input type="text" id="u" placeholder="Name" value="User1" maxlength="10">
        <input type="text" id="m" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="s()">Send</button>
    </div>
</div>

<script>
    // Initialize cross-tab broadcasting engine
    const chatChannel = new BroadcastChannel('group_chat_channel');
    
    const msgContainer = document.getElementById("msg");
    const mInput = document.getElementById("m");
    const uInput = document.getElementById("u");

    // Automatically send message when pressing Enter inside the input box
    mInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault(); 
            s();
        }
    });

    // Pick a distinct neon color using a basic hash code string
    function getUserColor(username) {
        const neonColors = ['#00f0ff', '#ff007f', '#39ff14', '#ffb703', '#9d4edd', '#ff4d6d', '#00e5ff', '#ccff00'];
        let hash = 0;
        for (let i = 0; i < username.length; i++) {
            hash = username.charCodeAt(i) + ((hash << 5) - hash);
        }
        const index = Math.abs(hash) % neonColors.length;
        return neonColors[index];
    }

    // Render incoming data onto the message board
    function appendMessage(id, user, text, originUser) {
        const currentUser = uInput.value.trim() || "Guest";
        // Check if message was generated by this specific username session
        const isSelf = (user === originUser);
        const nameColor = getUserColor(user);

        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${isSelf ? 'self' : 'other'}`;
        wrapper.id = `msg-${id}`;

        wrapper.innerHTML = `
            <div class="user-header">
                <span style="color: ${nameColor}">${escapeHtml(user)}</span>
                <button class="delete-btn" onclick="deleteMsg('${id}')">Delete</button>
            </div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;

        msgContainer.appendChild(wrapper);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // Listen to real-time events broadcasted from other tabs
    chatChannel.onmessage = (e) => {
        const data = e.data;
        if (data.type === 'send') {
            appendMessage(data.id, data.user, data.text, uInput.value.trim());
        } else if (data.type === 'delete') {
            const element = document.getElementById(`msg-${data.id}`);
            if (element) element.remove();
        }
    };

    function s() {
        const u = uInput.value.trim() || "Guest";
        const m = mInput.value.trim();
        if(!m) return;

        const msgId = Date.now() + Math.random().toString(36).substr(2, 5);
        const payload = { type: 'send', id: msgId, user: u, text: m };
        
        // Show locally
        appendMessage(msgId, u, m, u);
        
        // Dispatch to other windows/tabs instantly
        chatChannel.postMessage(payload);
        mInput.value = "";
    }

    function deleteMsg(id) {
        // Remove locally
        const element = document.getElementById(`msg-${id}`);
        if (element) element.remove();
        
        // Dispatch deletion action to other tabs
        chatChannel.postMessage({ type: 'delete', id: id });
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>
</body>
</html>
