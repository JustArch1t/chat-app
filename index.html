<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        #box { width: 90vw; max-width: 400px; height: 85dvh; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; color: white; background: #444; font-size: 1rem; display: flex; flex-direction: column; }
        .mine .bubble { background: #007bff; }
        .msg-header { font-size: 0.75rem; opacity: 0.8; display: flex; justify-content: space-between; margin-bottom: 4px; }
        #in { display: flex; gap: 5px; align-items: center; width: 100%; flex-shrink: 0; margin-top: 8px; position: relative; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 15px; flex-grow: 1; min-width: 0; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; flex-shrink: 0; }
        #emojiPopup { display: none; position: absolute; bottom: 60px; left: 0; background: #222; border: 1px solid #444; padding: 10px; border-radius: 15px; width: 100%; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" style="width: 70px; flex-grow: 0;">
        <button id="emojiBtn" class="action-btn">😊</button>
        <button id="clearBtn" class="action-btn">🗑️</button>
        <div id="emojiPopup">
            <span>😀</span><span>😂</span><span>🤣</span><span>😊</span><span>💀</span>
            <span>😍</span><span>😎</span><span>🤔</span><span>😴</span><span>😭</span>
            <span>😡</span><span>👍</span><span>👎</span><span>🔥</span><span>❤️</span>
            <span>✨</span><span>🎉</span><span>🚀</span><span>💯</span><span>🐱</span>
            <span>🐶</span><span>⚽</span><span>💡</span><span>🍔</span><span>🎮</span>
        </div>
        <input type="text" id="m" placeholder="Msg...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    
    document.getElementById("u").value = "User-" + Math.floor(Math.random() * 1000);

    const emojiBtn = document.getElementById("emojiBtn");
    const emojiPopup = document.getElementById("emojiPopup");
    const m = document.getElementById("m");
    const u = document.getElementById("u");

    // Emoji Logic: Force insertion into whichever input is currently focused
    emojiBtn.onclick = (e) => { e.stopPropagation(); emojiPopup.style.display = (emojiPopup.style.display === "grid") ? "none" : "grid"; };
    emojiPopup.onclick = (e) => { 
        if(e.target.tagName === 'SPAN') { 
            const active = document.activeElement;
            if (active.tagName === 'INPUT') {
                active.value += e.target.innerText;
                active.focus();
            }
        } 
    };

    const sendMessage = () => { if(m.value.trim() !== "") { db.push({ user: u.value, text: m.value.trim() }); m.value = ""; } };
    document.getElementById("sendBtn").onclick = sendMessage;
    m.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };
    document.getElementById("clearBtn").onclick = () => { if(confirm("Clear all?")) db.remove(); };

    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.id = s.key;
        div.className = `msg-container ${d.user === u.value ? 'mine' : 'theirs'}`;
        div.innerHTML = `<div class="bubble"><div class="msg-header"><b>${d.user}</b>${d.user === u.value ? '<span><span onclick="window.edit(\''+s.key+'\')" style="cursor:pointer">✎</span> <span onclick="db.child(\''+s.key+'\').remove()" style="cursor:pointer">✖</span></span>' : ''}</div><span class="txt">${d.text}</span></div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });

    window.edit = (key) => {
        const bubble = document.getElementById(key).querySelector('.bubble');
        const txtSpan = bubble.querySelector('.txt');
        const oldText = txtSpan.innerText;
        txtSpan.innerHTML = `<input type="text" value="${oldText}" id="edit-box" style="width:100%; border-radius:5px; padding:5px; color:black;">`;
        const input = document.getElementById("edit-box");
        input.focus();
        
        const finishEdit = () => { 
            db.child(key).update({ text: input.value });
        };
        input.onkeydown = (e) => { if(e.key === "Enter") finishEdit(); };
        input.onblur = finishEdit;
    };

    db.on('child_changed', (s) => {
        const d = s.val();
        document.getElementById(s.key).querySelector('.bubble').innerHTML = `<div class="msg-header"><b>${d.user}</b>${d.user === u.value ? '<span><span onclick="window.edit(\''+s.key+'\')" style="cursor:pointer">✎</span> <span onclick="db.child(\''+s.key+'\').remove()" style="cursor:pointer">✖</span></span>' : ''}</div><span class="txt">${d.text}</span>`;
    });
    db.on('child_removed', (s) => document.getElementById(s.key)?.remove());
</script>
</body>
</html>
