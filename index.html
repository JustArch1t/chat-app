<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        /* Reduced blur to make it clearer */
        #box { width: 95vw; max-width: 400px; height: 85dvh; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-container { display: flex; width: 100%; align-items: center; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 1rem; background: #333; color: white; position: relative; }
        .mine .bubble { background: #007bff; }
        
        /* Force buttons to stay inside the input row */
        #in { display: flex; gap: 5px; align-items: center; width: 100%; flex-shrink: 0; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 15px; flex-grow: 1; min-width: 0; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 8px; font-size: 1.2rem; color: white; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 50px; flex-grow: 0;">
        <button class="action-btn" onclick="document.getElementById('m').value += '😊'">😊</button>
        <input type="text" id="m" placeholder="Msg...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    const myId = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myId;

    function send() { const t = document.getElementById("m").value.trim(); if(t) { db.push({ user: myId, text: t }); document.getElementById("m").value = ""; } }
    document.getElementById("sendBtn").onclick = send;

    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = `msg-container ${d.user === myId ? 'mine' : 'theirs'}`;
        div.innerHTML = `<div class="bubble">${d.text} ${d.user === myId ? 
            '<span onclick="editMsg(\''+s.key+'\',\''+d.text+'\')" style="margin-left:10px;">✎</span>' +
            '<span onclick="db.child(\''+s.key+'\').remove()" style="margin-left:10px; color:#ff4d4d;">✖</span>' 
            : ''}</div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });
