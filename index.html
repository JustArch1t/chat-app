<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #04080e; /* Restored background style */
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; width: 100vw; overflow: hidden;
        }
        #box { 
            width: 95vw; max-width: 380px; height: 85vh; 
            background: var(--glass-bg); backdrop-filter: blur(10px); 
            border-radius: 20px; display: flex; flex-direction: column; 
            border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; font-weight: bold; }
        #msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { max-width: 80%; padding: 10px; border-radius: 12px; color: white; background: rgba(255,255,255,0.1); align-self: flex-start; }
        .self { align-self: flex-end; background: rgba(0, 120, 255, 0.4); }
        
        #in { padding: 10px; background: rgba(0,0,0,0.3); display: flex; align-items: center; gap: 5px; }
        #u { width: 70px; padding: 8px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; text-align: center; }
        #m { flex: 1; padding: 8px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        
        #emoji-picker { display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; background: rgba(0,0,0,0.5); border-top: 1px solid #444; }
        .emoji { cursor: pointer; text-align: center; font-size: 1.2rem; padding: 5px; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">Group-Chat</div>
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <input type="text" id="u" value="User1" maxlength="10">
        <button onclick="document.getElementById('emoji-picker').style.display = (document.getElementById('emoji-picker').style.display === 'grid' ? 'none' : 'grid')">😊</button>
        <input type="text" id="m" placeholder="Message...">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const picker = document.getElementById('emoji-picker');
    const emojis = ['😀', '😂', '😍', '😭', '💀', '👍', '🔥', '❤️', '😢', '😎', '😅', '🤣', '😇', '🙃', '🥰', '🤩', '🤪', '👊', '🤟', '👌'];
    emojis.forEach(e => {
        const div = document.createElement('div');
        div.className = 'emoji'; div.innerText = e;
        div.onclick = () => { document.getElementById('m').value += e; };
        picker.appendChild(div);
    });

    function send() {
        const u = document.getElementById('u').value;
        const m = document.getElementById('m').value;
        if(!m.trim()) return;
        const div = document.createElement('div');
        div.className = 'msg-wrapper self';
        div.innerText = u + ": " + m;
        document.getElementById('msg').appendChild(div);
        document.getElementById('msg').scrollTop = document.getElementById('msg').scrollHeight;
        document.getElementById('m').value = '';
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('m').onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
