<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        #box { width: 95vw; max-width: 450px; height: 85dvh; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Bubbles */
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; color: white; position: relative; }
        .mine .bubble { background: #007bff; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: #444; border-bottom-left-radius: 4px; }
        
        /* Input Row */
        #in { display: flex; gap: 8px; align-items: center; width: 100%; flex-shrink: 0; margin-top: 10px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 20px; flex-grow: 1; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 8px; font-size: 1.3rem; color: white; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 60px; flex-grow: 0;" readonly>
        <input type="text" id="m" placeholder="Message...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    // Initialize Firebase
    const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    
    // Set User
    const myId = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myId;

    // Send Message
    const send = () => {
        const m = document.getElementById("m");
        if(m.value.trim()) { db.push({ user: myId, text: m.value.trim() }); m.value = ""; }
    };
    document.getElementById("sendBtn").onclick = send;
    document.getElementById("m").onkeypress = (e) => { if(e.key === 'Enter') send(); };

    // Render Messages
    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.id = s.key;
        div.className = `msg-container ${d.user === myId ? 'mine' : 'theirs'}`;
        div.innerHTML = `<div class="bubble">${d.text} ${d.user === myId ? 
            '<span style="margin-left:10px; cursor:pointer" onclick="edit(\''+s.key+'\')">✎</span>' +
            '<span style="margin-left:10px; cursor:pointer" onclick="db.child(\''+s.key+'\').remove()">✖</span>' : ''}</div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });

    // Edit Logic
    window.edit = (key) => {
