<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            background: #04080e url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
        }
        #box { 
            width: 90vw; /* Shrunk slightly for better mobile fit */
            max-width: 400px; /* Narrower chat box */
            height: 85dvh;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            padding: 10px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex; 
            flex-direction: column;
        }
        #msg { flex-grow: 1; overflow-y: auto; padding: 5px; margin-bottom: 10px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .msg-wrapper { margin-bottom: 8px; padding: 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Input area fixes */
        #in { display: flex; gap: 4px; align-items: center; width: 100%; flex-shrink: 0; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 5px; min-width: 0; }
        
        /* Action buttons */
        .action-btn { background: transparent; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; flex-shrink: 0; }
        .edit-btn { color: #4ade80; }
        .del-btn { color: #f87171; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" style="width: 60px;">
        <input type="text" id="m" placeholder="Message..." style="flex-grow:1;">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-room-e8152"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    document.getElementById("u").value = "User-" + Math.floor(Math.random() * 1000);

    function send() {
        const text = document.getElementById("m").value.trim();
        if(text) { db.push({ user: document.getElementById("u").value, text: text }); document.getElementById("m").value = ""; }
    }
    document.getElementById("sendBtn").onclick = send;

    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.id = s.key;
        div.className = "msg-wrapper";
        div.innerHTML = `<b>${d.user}:</b> <span class="bubble">${d.text}</span>`;
        
        if (d.user === document.getElementById("u").value) {
            const editBtn = document.createElement("button");
            editBtn.innerHTML = "✎"; editBtn.className = "action-btn edit-btn";
            editBtn.onclick = () => {
                const bubble = div.querySelector('.bubble');
                const orig = bubble.innerText;
                bubble.innerHTML = `<input type="text" value="${orig}" style="width: 80%;">`;
                const input = bubble.querySelector('input');
                input.focus();
                input.onblur = () => {
                    if (input.value && input.value !== orig) db.child(s.key).update({ text: input.value });
                    else bubble.innerText = orig;
                };
            };
            const delBtn = document.createElement("button");
            delBtn.innerHTML = "✖"; delBtn.className = "action-btn del-btn";
            delBtn.onclick = () => db.child(s.key).remove();
            div.appendChild(editBtn); div.appendChild(delBtn);
        }
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });

    db.on('child_changed', (s) => { document.getElementById(s.key).querySelector('.bubble').innerText = s.val().text; });
    db.on('child_removed', (s) => { document.getElementById(s.key)?.remove(); });
</script>
</body>
</html>
