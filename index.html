<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <style>
        :root { --text-light: #e2e8f0; --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }
        #box { width: 95vw; max-width: 380px; height: 80vh; background: var(--glass-bg); backdrop-filter: blur(0.5px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #msg { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; padding: 8px 12px; border-radius: 12px; }
        .msg-wrapper.self { align-self: flex-end; background: rgba(255, 255, 255, 0.15); border-bottom-right-radius: 2px; }
        .msg-wrapper.other { align-self: flex-start; background: rgba(0, 0, 0, 0.3); border-bottom-left-radius: 2px; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.75rem; font-weight: bold; min-height: 24px; }
        .actions { display: flex; gap: 8px; margin-left: 20px; flex-shrink: 0; }
        .btn-small { border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .delete-btn { background: rgba(255, 77, 77, 0.25); color: #ff4d4d; }
        .edit-btn { background: rgba(255, 255, 255, 0.25); color: #ffffff; }
        .bubble { font-size: 0.9rem; line-height: 1.3; white-space: pre-wrap; color: #ffffff; }
        
        #in { padding: 12px; display: flex; gap: 8px; align-items: center; background: rgba(0, 0, 0, 0.2); position: relative; }
        .user-section { display: flex; align-items: center; gap: 5px; }
        #u { width: 70px; text-align: center; font-weight: bold; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 10px; color: white; }
        .input-container { position: relative; flex-grow: 1; display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        input#m { background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 0.9rem; width: 100%; }
        
        #emoji-picker { position: absolute; bottom: 70px; left: 10px; right: 10px; background: #1a1a1a; border: 1px solid #444; padding: 10px; border-radius: 10px; display: none; grid-template-columns: repeat(8, 1fr); gap: 8px; z-index: 10; }
        .emoji-item { cursor: pointer; font-size: 1.3rem; text-align: center; }
        
        button.emoji-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }
