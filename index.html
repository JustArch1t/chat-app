<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        #box { width: 95vw; max-width: 500px; height: 85dvh; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); padding: 15px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Flex alignment: Mine (right), Theirs (left) */
        .msg-container { display: flex; width: 100%; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        
        /* Rounded aesthetic bubbles */
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 75%; font-size: 1rem; background: #333; color: white; position: relative; }
        .mine .bubble { background: #007bff; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: #444; border-bottom-left-radius: 4px; }
        
        #in { display: flex; gap: 8px; align-items: center; width: 100%; flex-shrink: 0; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 20px; flex-grow: 1; min-width: 0; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 8px; font-size: 1.3rem; color: white; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 60px; flex-grow: 0;">
        <button class="action-btn" onclick="document.getElementById('m').value += '😊'">😊</button>
        <input type="text" id="m" placeholder="Message...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    const myId = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myId;

    document.getElementById("sendBtn").onclick = () => {
        const m = document.getElementById("m");
        if(m.value.trim()) { db.push({ user: myId, text: m.value.trim() }); m.value = ""; }
    };
