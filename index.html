<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #04080e; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #box { width: 90vw; max-width: 400px; height: 85vh; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; background: #444; color: white; display: flex; flex-direction: column; }
        .mine .bubble { background: #007bff; align-self: flex-end; }
        .msg-header { font-size: 0.7rem; opacity: 0.7; display: flex; justify-content: space-between; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 10px; }
        #emojiPopup { display: none; position: absolute; bottom: 80px; background: #222; padding: 10px; border-radius: 10px; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" style="width: 60px;">
        <button id="emojiBtn">😊</button>
        <button id="clearBtn">🗑️</button>
        <div id="emojiPopup">
            <span>😀</span><span>😂</span><span>🤣</span><span>😊</span><span>💀</span>
            <span>😍</span><span>😎</span><span>🤔</span><span>😴</span><span>😭</span>
            <span>😡</span><span>👍</span><span>👎</span><span>🔥</span><span>❤️</span>
            <span>✨</span><span>🎉</span><span>🚀</span><span>💯</span><span>🐱</span>
            <span>🐶</span><span>⚽</span><span>💡</span><span>🍔</span><span>🎮</span>
        </div>
        <input type="text" id="m" placeholder="Msg...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<script>
    firebase.initializeApp({ apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" });
    const db = firebase.database().ref('messages');
    document.getElementById("u").value = "User-" + Math.floor(Math.random() * 1000);

    const m = document.getElementById("m"), emojiPopup = document.getElementById("emojiPopup");

    document.getElementById("emojiBtn").onclick = (e) => { e.stopPropagation(); emojiPopup.style.display = (emojiPopup.style.display === "grid" ? "none" : "grid"); };
    emojiPopup.onclick = (e) => { 
        if(e.target.tagName === 'SPAN') { 
            const target = document.getElementById('edit-box') || m;
            target.value += e.target.innerText;
            target.focus();
        } 
    };

    const send = () => { if(m.value.trim()){ db.push({ user: document.getElementById("u").value, text: m.value.trim() }); m.value = ""; } };
    document.getElementById("sendBtn").onclick = send;

    db.on('child_added', (s) => {
        const d = s.val(), div = document.createElement("div");
        div.id = s.key;
        div.className = (d.user === document.getElementById("u").value ? 'mine' : 'theirs') + " msg-container";
        div.innerHTML = `<div class="bubble"><div class="msg-header"><b>${d.user}</b> ${d.user === document.getElementById("u").value ? '<span onclick="edit(\''+s.key+'\')">✎</span> <span onclick="db.child(\''+s.key+'\').remove()">✖</span>' : ''}</div><span class="txt">${d.text}</span></div>`;
        document.getElementById("msg").appendChild(div);
    });

    window.edit = (key) => {
        const bubble = document.getElementById(key).querySelector('.bubble');
        const txt = bubble.querySelector('.txt');
        const input = document.createElement('input');
        input.id = 'edit-box';
        input.value = txt.innerText;
        bubble.replaceChild(input, txt);
        input.focus();

        const save = () => {
            db.child(key).update({ text: input.value });
            const newTxt = document.createElement('span');
            newTxt.className = 'txt';
            newTxt.innerText = input.value;
            bubble.replaceChild(newTxt, input);
        };
        input.onkeydown = (e) => { if(e.key === 'Enter') save(); };
        input.onblur = save;
    };

    db.on('child_changed', (s) => {
        const bubble = document.getElementById(s.key).querySelector('.txt');
        if(bubble) bubble.innerText = s.val().text;
    });
    db.on('child_removed', (s) => document.getElementById(s.key)?.remove());
</script>
</body>
</html>
