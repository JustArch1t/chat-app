<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Chat App</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#04080e;
    overflow:hidden;
}

#box{
    width:95vw;
    max-width:500px;
    height:90vh;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
}

#msg-container{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:15px;
    padding-right:5px;
}

.bubble-wrapper{
    display:flex;
    flex-direction:column;
}

.bubble-wrapper.mine{
    align-items:flex-end;
}

.header{
    font-size:.75rem;
    color:#ddd;
    margin-bottom:4px;
}

.bubble{
    max-width:85%;
    padding:12px 16px;
    border-radius:18px;
    background:rgba(0,0,0,.4);
    color:white;
    word-break:break-word;
}

.mine .bubble{
    background:rgba(0,123,255,.7);
}

.controls{
    display:flex;
    gap:5px;
    margin-top:5px;
}

.controls button{
    padding:4px 8px;
    font-size:12px;
}

#input-area{
    display:flex;
    gap:8px;
    position:relative;
}

input{
    padding:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.15);
    color:white;
}

#name{
    width:90px;
}

#text{
    flex:1;
}

button{
    border:none;
    cursor:pointer;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.2);
    color:white;
}

button:hover{
    background:rgba(255,255,255,.3);
}

#emoji-popup{
    display:none;
    position:absolute;
    bottom:65px;
    left:0;
    background:#222;
    padding:12px;
    border-radius:15px;
    border:1px solid #444;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    z-index:999;
}

#emoji-popup span{
    cursor:pointer;
    font-size:22px;
}
</style>
</head>

<body>

<div id="box">

    <div id="msg-container"></div>

    <div id="input-area">
        <input type="text" id="name" placeholder="Name">

        <button id="emojiBtn">😊</button>

        <button id="clearBtn">🗑️</button>

        <input type="text" id="text" placeholder="Message...">

        <button id="sendBtn">➤</button>

        <div id="emoji-popup">
            <span>😀</span>
            <span>😂</span>
            <span>😍</span>
            <span>😎</span>
            <span>🔥</span>
            <span>❤️</span>
            <span>👍</span>
            <span>🎉</span>
            <span>🤔</span>
            <span>😭</span>
        </div>
    </div>

</div>

<script>

// Firebase Configuration
firebase.initializeApp({
    apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
    authDomain: "chat-room-e8152.firebaseapp.com",
    databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chat-room-e8152",
    storageBucket: "chat-room-e8152.firebasestorage.app",
    messagingSenderId: "875122406489",
    appId: "1:875122406489:web:c0f66c7a7903b9e87eed48",
    measurementId: "G-3CG2NMQEPN"
});

const db = firebase.database().ref("messages");

const msgList = document.getElementById("msg-container");
const textInput = document.getElementById("text");
const nameInput = document.getElementById("name");
const emojiPopup = document.getElementById("emoji-popup");

// Random username
nameInput.value = "User-" + Math.floor(Math.random() * 1000);

// Emoji Popup
document.getElementById("emojiBtn").onclick = (e)=>{
    e.stopPropagation();

    emojiPopup.style.display =
        emojiPopup.style.display === "grid"
        ? "none"
        : "grid";
};

emojiPopup.onclick = (e)=>{
    if(e.target.tagName === "SPAN"){
        textInput.value += e.target.innerText;
        textInput.focus();
    }
};

document.onclick = ()=>{
    emojiPopup.style.display = "none";
};

// Send Message
function send(){

    const text = textInput.value.trim();

    if(!text) return;

    db.push({
        user:nameInput.value || "Anon",
        text:text,
        time:Date.now()
    });

    textInput.value="";
}

document.getElementById("sendBtn").onclick = send;

textInput.addEventListener("keypress",(e)=>{
    if(e.key === "Enter"){
        send();
    }
});

// Clear Chat
document.getElementById("clearBtn").onclick = ()=>{
    if(confirm("Delete all messages?")){
        db.remove();
    }
};

// Edit/Delete
msgList.addEventListener("click",(e)=>{

    const wrapper = e.target.closest(".bubble-wrapper");

    if(!wrapper) return;

    const key = wrapper.dataset.key;

    if(e.target.classList.contains("del")){
        db.child(key).remove();
    }

    if(e.target.classList.contains("edit")){
        startEdit(key);
    }
});

function startEdit(key){

    const wrapper =
        document.querySelector(`[data-key="${key}"]`);

    const content =
        wrapper.querySelector(".content");

    const oldText = content.innerText;

    const input = document.createElement("input");

    input.value = oldText;

    content.replaceWith(input);

    input.focus();

    function save(){

        const newValue = input.value.trim();

        if(newValue){
            db.child(key).update({
                text:newValue
            });
        }
    }

    input.addEventListener("keydown",(e)=>{
        if(e.key === "Enter"){
            save();
            input.blur();
        }
    });

    input.addEventListener("blur",save);
}

// Display Messages
db.on("value",(snapshot)=>{

    msgList.innerHTML="";

    snapshot.forEach((child)=>{

        const data = child.val();
        const key = child.key;

        const wrapper =
            document.createElement("div");

        wrapper.className =
            "bubble-wrapper";

        wrapper.dataset.key = key;

        if(data.user === nameInput.value){
            wrapper.classList.add("mine");
        }

        const time =
            new Date(data.time || Date.now())
            .toLocaleTimeString([],{
                hour:"2-digit",
                minute:"2-digit"
            });

        wrapper.innerHTML = `
            <div class="header">
                ${data.user} • ${time}
            </div>

            <div class="bubble">
                <div class="content">
                    ${data.text}
                </div>
            </div>

            <div class="controls">
                <button class="edit">✏️</button>
                <button class="del">🗑️</button>
            </div>
        `;

        msgList.appendChild(wrapper);
    });

    msgList.scrollTop =
        msgList.scrollHeight;
});

</script>

</body>
</html>
