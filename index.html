<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        #box { width: 90vw; max-width: 400px; height: 85dvh; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 16px; max-width: 80%; color: white; background: #444; font-size: 0.95rem; }
        .mine .bubble { background: #007bff; border-bottom-right-radius: 4px; }
        
        #in { display: flex; gap: 5px; align-items: center; width: 100%; flex-shrink: 0; margin-top: 8px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 15px; flex-grow: 1; min-width: 0; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 50px; flex-grow: 0;" readonly>
        <button class="action-btn" onclick="addEmoji('😊')">😊</button>
        <input type="text" id="m" placeholder="Msg...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", 
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "chat-room-e8152" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    const myId = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myId;

    // Emoji Logic
    window.addEmoji = (emoji) => {
        const input = document.getElementById('m');
        input.value += emoji;
        input.focus();
    };

    // Send Logic
    function sendMessage() {
        const m = document.getElementById("m");
        if(m.value.trim() !== "") {
            db.push({ user: myId, text: m.value.trim() });
            m.value = "";
        }
    }
    document.getElementById("sendBtn").onclick = sendMessage;
    document.getElementById("m").onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

    // Render Logic
    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.id = s.key;
        div.className = `msg-container ${d.user === myId ? 'mine' : 'theirs'}`;
        div.innerHTML = `<div class="bubble"><span class="txt">${d.text}</span> ${d.user === myId ? 
            '<span style="margin-left:8px; cursor:pointer" onclick="edit(\''+s.key+'\')">✎</span>' +
            '<span style="margin-left:8px; cursor:pointer" onclick="db.child(\''+s.key+'\').remove()">✖</span>' : ''}</div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });

    // Edit Logic
    window.edit = (key) => {
        const bubble = document.getElementById(key).querySelector('.bubble');
        const oldText = bubble.querySelector('.txt').innerText;
        bubble.innerHTML = `<input type="text" value="${oldText}" id="edit-box" style="width:100%; border-radius:5px; padding:5px;">`;
        const input = document.getElementById("edit-box");
        input.focus();
        input.onkeypress = (e) => { if(e.key === 'Enter') db.child(key).update({ text: input.value }); };
        input.onblur = () => db.child(key).update({ text: input.value });
    };

    db.on('child_changed', (s) => {
        const el = document.getElementById(s.key);
        if(el) el.querySelector('.bubble').innerHTML = `<span class="txt">${s.val().text}</span> <span style="margin-left:8px; cursor:pointer" onclick="edit('${s.key}')">✎</span> <span style="margin-left:8px; cursor:pointer" onclick="db.child('${s.key}').remove()">✖</span>`;
    });
    db.on('child_removed', (s) => document.getElementById(s.key)?.remove());
</script>
</body>
</html>
