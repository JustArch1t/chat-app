<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #04080e; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; color: white; }
        
        #box { width: 95vw; max-width: 400px; height: 90vh; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); font-weight: bold; text-align: center; }
        
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 10px; max-width: 80%; align-self: flex-start; }
        .msg.self { align-self: flex-end; background: rgba(0, 120, 255, 0.4); }
        .actions { display: flex; gap: 5px; margin-top: 5px; }
        .action-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }

        .input-area { padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.1); }
        .controls { display: flex; gap: 5px; margin-bottom: 5px; }
        input { padding: 8px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); color: white; }
        #u { width: 80px; }
        .msg-input { display: flex; gap: 5px; }
        #m { flex: 1; }
        button { padding: 8px 12px; border-radius: 6px; border: none; background: #007bff; color: white; cursor: pointer; }

        #emoji-box { display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 5px; background: #222; }
        .emoji { cursor: pointer; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="box">
    <div class="header">Group Chat</div>
    <div id="msg-container"></div>
    <div id="emoji-box"></div>
    <div class="input-area">
        <div class="controls">
            <input type="text" id="u" value="User1" maxlength="10">
            <button onclick="document.getElementById('emoji-box').style.display = (document.getElementById('emoji-box').style.display === 'grid' ? 'none' : 'grid')">😊</button>
        </div>
        <div class="msg-input">
            <input type="text" id="m" placeholder="Message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<script>
    const emojis = ['😀', '😂', '😍', '😭', '💀', '👍', '🔥', '❤️', '😢', '😎'];
    const emojiBox = document.getElementById('emoji-box');
    
    emojis.forEach(e => {
        const d = document.createElement('div');
        d.className = 'emoji'; d.innerText = e;
        d.onclick = () => document.getElementById('m').value += e;
        emojiBox.appendChild(d);
    });

    function addMessage() {
        const u = document.getElementById('u').value;
        const m = document.getElementById('m').value;
        if (!m.trim()) return;
        
        const div = document.createElement('div');
        div.className = 'msg self';
        div.innerHTML = `<div><b>${u}:</b> ${m}</div>
            <div class="actions">
                <button class="action-btn" onclick="edit(this)">Edit</button>
                <button class="action-btn" onclick="this.parentElement.parentElement.remove()">Delete</button>
            </div>`;
        document.getElementById('msg-container').appendChild(div);
        document.getElementById('m').value = '';
        document.getElementById('msg-container').scrollTop = document.getElementById('msg-container').scrollHeight;
    }

    function edit(btn) {
        const textDiv = btn.parentElement.parentElement.querySelector('div');
        const newText = prompt("Edit message:", textDiv.innerText.split(': ')[1]);
        if (newText) textDiv.innerHTML = `<b>${document.getElementById('u').value}:</b> ${newText}`;
    }

    document.getElementById('sendBtn').onclick = addMessage;
    document.getElementById('m').onkeydown = (e) => { if (e.key === 'Enter') addMessage(); };
</script>
</body>
</html>
