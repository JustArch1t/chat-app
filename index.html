<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #04080e; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        #box { width: 95vw; max-width: 400px; height: 90vh; background: #1a1a1a; border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #333; }
        
        .chat-header { padding: 15px; border-bottom: 1px solid #333; color: white; font-weight: bold; }
        #msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        #in { padding: 10px; display: flex; align-items: center; gap: 5px; border-top: 1px solid #333; background: #222; }
        #u { width: 70px; padding: 8px; border-radius: 10px; border: none; background: #333; color: white; }
        .input-wrapper { flex: 1; display: flex; align-items: center; gap: 5px; }
        #m { flex: 1; padding: 8px; border-radius: 10px; border: none; background: #333; color: white; }
        
        button { background: #444; border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        #emoji-picker { display: none; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; background: #333; border-top: 1px solid #444; }
        .emoji { cursor: pointer; text-align: center; font-size: 1.2rem; }
        
        .msg-wrapper { max-width: 80%; padding: 8px; border-radius: 10px; color: white; background: #333; align-self: flex-start; }
        .self { align-self: flex-end; background: #0056b3; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">Group-Chat</div>
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" value="User1">
        <button onclick="document.getElementById('emoji-picker').style.display = (document.getElementById('emoji-picker').style.display === 'grid' ? 'none' : 'grid')">😊</button>
        <div class="input-wrapper">
            <input type="text" id="m" placeholder="Message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<script>
    const picker = document.getElementById('emoji-picker');
    const emojis = ['😀', '😂', '😍', '😭', '💀', '👍', '🔥', '❤️', '😢', '😎'];
    emojis.forEach(e => {
        const span = document.createElement('div');
        span.className = 'emoji'; span.innerText = e;
        span.onclick = () => { document.getElementById('m').value += e; };
        picker.appendChild(span);
    });

    function send() {
        const u = document.getElementById('u').value;
        const m = document.getElementById('m').value;
        if(!m) return;
        const div = document.createElement('div');
        div.className = 'msg-wrapper';
        div.innerText = u + ": " + m;
        document.getElementById('msg').appendChild(div);
        document.getElementById('m').value = '';
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('m').onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
