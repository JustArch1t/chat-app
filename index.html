<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat Room</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151d30;
            --bg-bubble-self: #0084ff;
            --bg-bubble-other: #24324f;
            --text-main: #ffffff;
            --text-muted: #8fa0c4;
            --border-color: #1e2942;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 10px;
        }

        #box {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-container { display: flex; align-items: center; font-size: 0.85rem; color: var(--text-muted); }

        #msg {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-wrapper { display: flex; align-items: flex-start; gap: 10px; max-width: 85%; position: relative; }
        .msg-wrapper.self { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.other { align-self: flex-start; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .msg-wrapper.self .avatar { background: #0084ff; }

        .msg-content { display: flex; flex-direction: column; gap: 2px; position: relative; }
        .user-name { font-size: 0.75rem; color: var(--text-muted); margin-left: 4px; }
        .msg-wrapper.self .user-name { align-self: flex-end; margin-right: 4px; }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .msg-wrapper.self .bubble {
            background: var(--bg-bubble-self);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-wrapper.other .bubble {
            background: var(--bg-bubble-other);
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .edited-tag { font-size: 0.65rem; color: var(--text-muted); align-self: flex-end; margin-top: 2px; display: none; }
        .msg-wrapper.self .edited-tag { align-self: flex-end; }

        /* Actions block on bubble hover */
        .msg-actions {
            display: none;
            gap: 8px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #1e2942;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            z-index: 10;
        }
        .msg-wrapper.self .msg-actions { left: -75px; }
        .msg-wrapper.other .msg-actions { right: -75px; }
        .msg-wrapper:hover .msg-actions { display: flex; }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px;
        }
        .action-btn:hover { color: #fff; }
        .action-btn.unsend:hover { color: #ef4444; }

        #in {
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            background: #1e2942;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
        }
        input:focus { border-color: #0084ff; }
        #u { width: 80px; text-align: center; font-weight: 500; }
        #m { flex-grow: 1; }

        button.send-btn {
            background: var(--bg-bubble-self);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">
        <h3>Secure Global Chat</h3>
        <div class="status-container">
            <span class="status-dot"></span> Live Connected
        </div>
    </div>
    
    <div id="msg"></div>
    
    <div id="in">
        <input type="text" id="u" placeholder="User" value="Guest" maxlength="10">
        <input type="text" id="m" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="s()">Send</button>
    </div>
</div>

<script>
    const ws = new WebSocket((window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host);
    const msgContainer = document.getElementById("msg");
    const mInput = document.getElementById("m");
    const uInput = document.getElementById("u");

    let editingMessageId = null; // Track if we are currently editing a message

    mInput.addEventListener("keypress", (e) => { if (e.key === "Enter") s(); });

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'send') {
            createMessageElement(data.id, data.user, data.text);
        } else if (data.type === 'edit') {
            const target = document.getElementById(`msg-${data.id}`);
            if (target) {
                target.querySelector('.bubble').textContent = data.text;
                target.querySelector('.edited-tag').style.display = 'block';
            }
        } else if (data.type === 'unsend') {
            const target = document.getElementById(`msg-${data.id}`);
            if (target) target.remove();
        }
    };

    function createMessageElement(id, user, text) {
        const currentUser = uInput.value.trim() || "Guest";
        const isSelf = (user === currentUser);

        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper ${isSelf ? 'self' : 'other'}`;
        wrapper.id = `msg-${id}`;

        const avatarLetter = user.charAt(0).toUpperCase();

        // Build HTML structure containing conditional edit/unsend controls for your own bubbles
        let actionsHtml = '';
        if (isSelf) {
            actionsHtml = `
                <div class="msg-actions">
                    <button class="action-btn" onclick="startEdit('${id}', '${text.replace(/'/g, "\\'")}')">Edit</button>
                    <button class="action-btn unsend" onclick="unsendMsg('${id}')">Unsend</button>
                </div>
            `;
        }

        wrapper.innerHTML = `
            <div class="avatar">${avatarLetter}</div>
            <div class="msg-content">
                <span class="user-name">${user}</span>
                <div class="bubble">${text}</div>
                <span class="edited-tag">edited</span>
            </div>
            ${actionsHtml}
        `;

        msgContainer.appendChild(wrapper);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function s() {
        const u = uInput.value.trim() || "Guest";
        const m = mInput.value.trim();
        if(!m) return;

        if (editingMessageId) {
            // Send edit action mapping payload over WebSocket
            ws.send(JSON.stringify({ type: 'edit', id: editingMessageId, text: m }));
            editingMessageId = null;
            document.querySelector('.send-btn').textContent = "Send";
        } else {
            // Send standard text mapping creation payload
            const msgId = Date.now() + Math.random().toString(36).substr(2, 5);
            ws.send(JSON.stringify({ type: 'send', id: msgId, user: u, text: m }));
        }
        mInput.value = "";
    }

    function startEdit(id, currentText) {
        editingMessageId = id;
        mInput.value = currentText;
        mInput.focus();
        document.querySelector('.send-btn').textContent = "Save";
    }

    function unsendMsg(id) {
        ws.send(JSON.stringify({ type: 'unsend', id: id }));
    }
</script>
</body>
</html>
