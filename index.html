<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #04080e; color: white; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }
        #box { width: 95vw; max-width: 400px; height: 90dvh; background: var(--glass-bg); backdrop-filter: blur(10px); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid var(--glass-border); overflow: hidden; }
        .chat-header { padding: 15px; border-bottom: 1px solid var(--glass-border); text-align: center; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { max-width: 85%; padding: 10px; border-radius: 12px; position: relative; }
        .msg-wrapper.self { align-self: flex-end; background: rgba(59, 130, 246, 0.6); }
        .msg-wrapper.other { align-self: flex-start; background: rgba(255, 255, 255, 0.1); }
        .user-header { font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; opacity: 0.7; }
        .bubble { font-size: 0.95rem; word-break: break-word; }
        #in { padding: 10px; background: rgba(0,0,0,0.2); }
        .input-row { display: flex; gap: 5px; align-items: center; }
        input { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 15px; outline: none; flex-grow: 1; }
        #u { width: 70px; }
        #emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 8px; background: rgba(0,0,0,0.3); }
        .emoji-item { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header"><h3>Group-Chat</h3></div>
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <div class="input-row">
            <input type="text" id="u" placeholder="Name" maxlength="10">
            <button onclick="document.getElementById('emoji-picker').style.display = (document.getElementById('emoji-picker').style.display === 'grid' ? 'none' : 'grid')" style="background:none; border:none; color:white; cursor:pointer;">😊</button>
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button id="sendBtn" style="background:none; border:none; color:white; font-size: 1.2rem; cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<script>
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
            authDomain: "chat-room-e8152.firebaseapp.com",
            databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chat-room-e8152",
            storageBucket: "chat-room-e8152.firebasestorage.app",
            messagingSenderId: "875122406489",
            appId: "1:875122406489:web:c0f66c7a7903b9e87eed48"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');
        const myId = "User-" + Math.floor(Math.random() * 1000);
        document.getElementById("u").value = myId;

        function send() {
            const m = document.getElementById("m").value.trim();
            if(m) {
                db.push({ user: document.getElementById("u").value, text: m });
                document.getElementById("m").value = "";
            }
        }

        document.getElementById("sendBtn").onclick = send;
        document.getElementById("m").onkeypress = (e) => { if(e.key === 'Enter') send(); };

        db.on('child_added', (s) => {
            const d = s.val();
            const div = document.createElement("div");
            div.id = s.key;
            div.className = `msg-wrapper ${d.user === document.getElementById("u").value ? 'self' : 'other'}`;
            let html = `<div class="user-header">${d.user}</div><div style="position:relative; padding-right: 45px;"><div class="bubble">${d.text}</div>`;
            if (d.user === document.getElementById("u").value) {
                html += `<div style="position:absolute; top:-5px; right:0; display:flex; gap:8px;">
                            <span id="edit-${s.key}" style="cursor:pointer; font-size:0.7rem; opacity:0.6;">Edit</span>
                            <span id="del-${s.key}" style="cursor:pointer; font-size:0.8rem; color:red; font-weight:bold;">×</span>
                         </div>`;
            }
            div.innerHTML = html + `</div>`;
            document.getElementById("msg").appendChild(div);
            if (d.user === document.getElementById("u").value) {
                document.getElementById(`del-${s.key}`).onclick = () => db.child(s.key).remove();
                document.getElementById(`edit-${s.key}`).onclick = () => {
                    const newText = prompt("Edit message:", d.text);
                    if (newText) db.child(s.key).update({ text: newText });
                };
            }
        });

        db.on('child_changed', (s) => { document.getElementById(s.key).querySelector('.bubble').innerText = s.val().text; });
        db.on('child_removed', (s) => { document.getElementById(s.key)?.remove(); });

        ['😀', '😂', '😍', '😭', '💀', '👍'].forEach(e => {
            const s = document.createElement('span'); s.className = 'emoji-item'; s.innerText = e;
            s.onclick = () => document.getElementById('m').value += e;
            document.getElementById('emoji-picker').appendChild(s);
        });
    } catch (e) { console.error(e); }
</script>
</body>
</html>
