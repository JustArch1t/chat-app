<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        #box { width: 95vw; max-width: 500px; height: 85dvh; background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        .msg-container { display: flex; width: 100%; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        .bubble { padding: 12px; border-radius: 15px; max-width: 75%; color: white; background: #444; }
        .mine .bubble { background: #007bff; }
        #in { display: flex; gap: 5px; align-items: center; width: 100%; flex-shrink: 0; margin-top: 10px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 15px; flex-grow: 1; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 8px; font-size: 1.2rem; color: white; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 50px; flex-shrink: 0;">
        <input type="text" id="m" placeholder="Message...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    try {
        const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');
        const myId = "User-" + Math.floor(Math.random() * 1000);
        document.getElementById("u").value = myId;

        document.getElementById("sendBtn").onclick = () => {
            const m = document.getElementById("m");
            if(m.value.trim()) { db.push({ user: myId, text: m.value.trim() }); m.value = ""; }
        };

        db.on('child_added', (s) => {
            const d = s.val();
            const div = document.createElement("div");
            div.className = `msg-container ${d.user === myId ? 'mine' : 'theirs'}`;
            div.innerHTML = `<div class="bubble">${d.text}</div>`;
            document.getElementById("msg").appendChild(div);
            document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
        });
    } catch (err) {
        document.body.innerHTML = "Initialization Error: " + err.message;
    }
</script>
</body>
</html>
