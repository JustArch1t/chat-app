<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background-color: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        #box { width: 95vw; max-width: 400px; height: 90dvh; background-color: #1e1e1e; padding: 15px; border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .msg-wrapper { margin-bottom: 15px; padding: 10px 15px; background: #2c2c2c; border-radius: 18px; display: flex; align-items: center; justify-content: space-between; }
        
        #in { display: flex; gap: 8px; align-items: center; width: 100%; flex-shrink: 0; padding-bottom: 5px; }
        input { background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; min-width: 0; flex-grow: 1; font-size: 16px; }
        .action-btn { background: transparent; border: none; cursor: pointer; padding: 10px; font-size: 1.2rem; color: #bbb; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 60px; flex-grow: 0;">
        <input type="text" id="m" placeholder="Message..." onfocus="this.scrollIntoView({behavior: 'smooth'})">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-room-e8152"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    document.getElementById("u").value = "User-" + Math.floor(Math.random() * 1000);

    function send() {
        const text = document.getElementById("m").value.trim();
        if(text) { 
            db.push({ user: document.getElementById("u").value, text: text }); 
            document.getElementById("m").value = ""; 
        }
    }
    document.getElementById("sendBtn").onclick = send;
    document.getElementById("m").onkeypress = (e) => { if(e.key === 'Enter') send(); };

    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg-wrapper";
        div.innerHTML = `<div><b>${d.user}:</b> <span>${d.text}</span></div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });
</script>
</body>
</html>
