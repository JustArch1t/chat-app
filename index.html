<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        /* Professional Dark Gradient Background */
        body { 
            font-family: sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            overflow: hidden; 
        }
        
        #box { width: 90vw; max-width: 400px; height: 85dvh; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 16px; max-width: 80%; color: white; background: #444; font-size: 0.95rem; }
        .mine .bubble { background: #007bff; border-bottom-right-radius: 4px; }
        
        #in { display: flex; gap: 5px; align-items: center; width: 100%; flex-shrink: 0; margin-top: 8px; position: relative; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 15px; flex-grow: 1; min-width: 0; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; flex-shrink: 0; }
        
        #emojiPopup { display: none; position: absolute; bottom: 50px; left: 0; background: #222; border: 1px solid #444; padding: 10px; border-radius: 15px; width: 220px; grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 50px; flex-grow: 0;" readonly>
        
        <button id="emojiBtn" class="action-btn">😊</button>
        <div id="emojiPopup">
            <span>😀</span><span>😂</span><span>🤣</span><span>😊</span><span>💀</span>
            <span>😍</span><span>😎</span><span>🤔</span><span>😴</span><span>😭</span>
