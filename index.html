<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group-Chat</title>
    <style>
        :root {
            --text-light: #e2e8f0;
            --glass-bg: rgba(15, 23, 42, 0.35);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glow-color: rgba(255, 255, 255, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: #0d0e15 url('https://raw.githubusercontent.com/JustArch1t/chat-app/main/background.jpg') no-repeat center center fixed;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1920');
            background-size: cover;
            color: var(--text-light);
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 12px;
        }

        #box {
            width: 100%; max-width: 440px; height: 85vh; 
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; display: flex; flex-direction: column; overflow: hidden;
            border: 2px solid var(--glass-border); 
            box-shadow: 0 0 25px var(--glow-color), inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .chat-header {
            padding: 20px 24px 10px 24px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-header h3 { font-size: 1.25rem; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }

        #msg { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; padding: 10px 16px; border-radius: 18px; }
        
        .msg-wrapper.self { 
            align-self: flex-end; 
            background: rgba(112, 79, 140, 0.55); 
            border: 1px solid rgba(180, 140, 210, 0.25);
            border-bottom-right-radius: 4px; 
        }
        
        .msg-wrapper.other { 
            align-self: flex-start; 
            background: rgba(175, 130, 60, 0.55); 
            border: 1px solid rgba(230, 180, 100, 0.25);
            border-bottom-left-radius: 4px; 
        }

        .user-header { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 4px; font-size: 0.75rem; font-weight: bold; }
        .bubble { font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; word-break: break-word; color: #ffffff; }

        .delete-btn {
            background: transparent; border: none; color: #ff6b6b; font-size: 0.75rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; text-shadow: 0 0 4px #ff6b6b; }

        #in { padding: 16px 20px 20px 20px; display: flex; gap: 10px; align-items: center; background: rgba(0, 0, 0, 0.15); }
        
        .input-container {
            position: relative; flex-grow: 1; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px;
        }
        
        input {
            background: transparent; border: none; color: white; padding: 12px 40px 12px 16px; outline: none; font-size: 0.95rem; width: 100%;
        }
        #u { width: 80px; text-align: center; font-weight: bold; padding-right: 8px; }

        .attachment-icon {
            position: absolute; right: 16px; color: rgba(255, 255, 255, 0.4); font-size: 1rem; pointer-events: none;
        }

        button.send-btn {
            background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 6px; transition: transform 0.1s;
        }
        button.send-btn:active { transform: scale(0.9); }
        button.send-btn svg { fill: rgba(255, 255, 255, 0.75); width: 22px; height: 22px; transition: fill 0.2s; }
        button.send-btn:hover svg { fill: #ffffff; filter: drop-shadow(0 0 4px rgba(255,255,255,0.4)); }

        #msg::-webkit-scrollbar { width: 4px; }
        #msg::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header">
        <h3>Group-Chat</h3>
    </div>
    
    <div id="msg"></div>
    
    <div id="in">
        <div class="input-container" style="width: 80px; flex-grow: 0;">
            <input type="text" id="u" placeholder="Name" value="User1" maxlength="10">
        </div>
        <div class="input-container">
            <input type="text" id="m" placeholder="Type a message..." autocomplete="off">
            <span class="attachment-icon">📎</span>
        </div>
