<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #04080e; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        #box { width: 95vw; max-width: 400px; height: 90dvh; background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        
        /* Aesthetic curved bubbles */
        .msg-wrapper { margin-bottom: 15px; padding: 10px 15px; background: rgba(255, 255, 255, 0.08); border-radius: 18px; display: flex; align-items: center; justify-content: space-between; }
        .bubble { display: inline-block; word-break: break-all; }
        
        #emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 10px; }
        .emoji-item { cursor: pointer; font-size: 1.2rem; text-align: center; }
        
        #in { display: flex; gap: 8px; align-items: center; width: 100%; flex-shrink: 0; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 20px; min-width: 0; flex-grow: 1; }
        .action-btn { background: transparent; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; flex-shrink: 0; }
        .edit-btn { color: #4ade80; }
        .del-btn { color: #f87171; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <input type="text" id="u" style="width: 60px; flex-grow: 0; border-radius: 20px;">
        <button class="action-btn" onclick="document.getElementById('emoji-picker').style.display = (document.getElementById('emoji-picker').style.display === 'grid' ? 'none' : 'grid')">😊</button>
        <input type="text" id="m" placeholder="Message...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

        apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-room-e8152"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    document.getElementById("u").value = "User-" + Math.floor(Math.random() * 1000);

        if(text) { db.push({ user: document.getElementById("u").value, text: text }); document.getElementById("m").value = ""; }
    }
