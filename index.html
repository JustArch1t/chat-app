<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #04080e; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #box { width: 90vw; max-width: 400px; height: 85vh; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; color: white; background: #444; position: relative; }
        .mine .bubble { background: #007bff; }
        #in { display: flex; gap: 5px; align-items: center; width: 100%; flex-shrink: 0; margin-top: 10px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 10px; flex-grow: 1; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" style="width:60px; flex-grow:0;">
        <button id="clearBtn" class="action-btn">🗑️</button>
        <input type="text" id="m" placeholder="Msg...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');

    // 1. Force the buttons to register
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const m = document.getElementById("m");
    const u = document.getElementById("u");

    // 2. Simple Send Function
    sendBtn.onclick = () => {
        let name = u.value || "Anonymous";
        if (m.value.trim() !== "") {
            db.push({ user: name, text: m.value.trim() });
            m.value = "";
        }
    };

    clearBtn.onclick = () => { if(confirm("Clear all?")) db.remove(); };

    // 3. Render
    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.id = s.key;
        div.className = "msg-container";
        div.innerHTML = `<div class="bubble"><b>${d.user}:</b> ${d.text}</div>`;
        document.getElementById("msg").appendChild(div);
    });
</script>
</body>
</html>
