<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worldwide Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* ... Keep your existing CSS here ... */
        :root { --text-light: #e2e8f0; --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #04080e; color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        #box { width: 95vw; max-width: 380px; height: 80vh; background: var(--glass-bg); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--glass-border); }
        #msg { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; padding: 8px 12px; border-radius: 12px; }
        .msg-wrapper.self { align-self: flex-end; background: rgba(0, 120, 255, 0.3); }
        .msg-wrapper.other { align-self: flex-start; background: rgba(255, 255, 255, 0.1); }
        .user-header { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; }
        #in { padding: 12px; background: rgba(0, 0, 0, 0.2); display: flex; gap: 8px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 20px; outline: none; }
        #u { width: 70px; text-align: center; }
        .input-container { flex-grow: 1; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header" style="padding: 16px;"><h3>Worldwide Chat</h3></div>
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" placeholder="Name" value="User1" maxlength="10">
        <div class="input-container"><input type="text" id="m" placeholder="Message..." autocomplete="off"></div>
        <button id="sendBtn" style="background:none; border:none; color:white; cursor:pointer;">➤</button>
    </div>
</div>

<script>
    // 1. SETUP FIREBASE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "chat-room-e8152.firebaseapp.com",
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-south1.firebasedatabase.app",
        projectId: "chat-room-e8152",
        storageBucket: "chat-room-e8152.firebasestorage.app",
        messagingSenderId: "875122406489",
        appId: "1:875122406489:web:c0f66c7a7903b9e87eed48"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    const myIdentity = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myIdentity;

    // 2. SEND TO CLOUD
    function sendMessage() {
        const u = document.getElementById("u").value;
        const m = document.getElementById("m").value.trim();
        if(!m) return;
        db.push({ user: u, text: m, timestamp: Date.now() });
        document.getElementById("m").value = "";
    }

    document.getElementById("sendBtn").onclick = sendMessage;

    // 3. LISTEN TO CLOUD
    db.on('child_added', (snapshot) => {
        const data = snapshot.val();
        renderBubble(snapshot.key, data.user, data.text);
    });

    function renderBubble(id, user, text) {
        const isSelf = (user === myIdentity);
        const div = document.createElement("div");
        div.className = `msg-wrapper ${isSelf ? 'self' : 'other'}`;
        div.innerHTML = `<div class="user-header">${user}</div><div class="bubble">${text}</div>`;
        const container = document.getElementById("msg");
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
