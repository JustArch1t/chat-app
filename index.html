<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }
        
        /* Shrunk chatbox for better mobile scaling */
        #box { width: 92vw; max-width: 400px; height: 85dvh; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg-container { display: flex; width: 100%; align-items: flex-end; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 1rem; position: relative; }
        .mine .bubble { background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: #333; color: white; border-bottom-left-radius: 4px; }
        
        #emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 5px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 10px; }
        #in { display: flex; gap: 5px; align-items: center; width: 100%; margin-top: 5px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 15px; flex-grow: 1; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.2rem; color: white; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <input type="text" id="u" style="width: 50px; flex-grow: 0;">
        <button class="action-btn" onclick="toggleEmoji()">😊</button>
        <input type="text" id="m" placeholder="Msg...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    const myId = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myId;

    function toggleEmoji() { const p = document.getElementById("emoji-picker"); p.style.display = (p.style.display === 'grid' ? 'none' : 'grid'); }
    function send() { const t = document.getElementById("m").value.trim(); if(t) { db.push({ user: myId, text: t }); document.getElementById("m").value = ""; } }
    
    document.getElementById("sendBtn").onclick = send;
    document.getElementById("m").onkeypress = (e) => { if(e.key === 'Enter') send(); };

    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = `msg-container ${d.user === myId ? 'mine' : 'theirs'}`;
        div.innerHTML = `<div class="bubble">${d.text} ${d.user === myId ? '<small onclick="editMsg(\''+s.key+'\',\''+d.text+'\')" style="cursor:pointer; margin-left:8px; opacity:0.6;">✎</small>' : ''}</div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });

    function editMsg(key, oldText) {
        const bubble = event.target.parentElement;
        bubble.innerHTML = `<input type="text" value="${oldText}" id="edit-in" style="width:100%;">`;
        const input = document.getElementById("edit-in");
        input.focus();
        input.onkeypress = (e) => { if(e.key === 'Enter') db.child(key).update({ text: input.value }); };
        input.onblur = () => db.child(key).update({ text: input.value });
    }

    db.on('child_changed', (s) => location.reload()); // Refresh to update edited UI

    ['😀', '😂', '😍', '😭', '💀', '👍'].forEach(e => {
        const s = document.createElement('span'); s.className = 'emoji-item'; s.innerText = e;
        s.onclick = () => document.getElementById("m").value += e;
        document.getElementById('emoji-picker').appendChild(s);
    });
</script>
</body>
</html>
