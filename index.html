<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --text-light: #e2e8f0; --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: #04080e url('background.jpg') no-repeat center center fixed; background-size: cover; color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }
        #box { width: 95vw; max-width: 380px; height: 80vh; background: var(--glass-bg); backdrop-filter: blur(5px); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #msg { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; padding: 8px 12px; border-radius: 12px; position: relative; }
        .msg-wrapper.self { align-self: flex-end; background: rgba(59, 130, 246, 0.6); }
        .msg-wrapper.other { align-self: flex-start; background: rgba(255, 255, 255, 0.1); }
        .user-header { font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; opacity: 0.8; }
        .bubble { font-size: 0.9rem; word-break: break-word; }
        #in { padding: 12px; background: rgba(0, 0, 0, 0.3); }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 20px; outline: none; flex-grow: 1; }
        #u { width: 70px; text-align: center; }
        #emoji-picker { display: none; grid-template-columns: repeat(6, 1fr); gap: 5px; padding: 8px; background: rgba(0,0,0,0.4); }
        .emoji-item { cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div id="box">
    <div class="chat-header"><h3>Group-Chat</h3></div>
    <div id="msg"></div>
    <div id="emoji-picker"></div>
    <div id="in">
        <div class="input-row">
            <input type="text" id="u" placeholder="Name" maxlength="10">
            <button onclick="togglePicker()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">😊</button>
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button id="sendBtn" style="background:none; border:none; cursor:pointer; color:white; font-size: 1.5rem;">➤</button>
        </div>
    </div>
</div>

<script>
    try {
        const firebaseConfig = {
            apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
            authDomain: "chat-room-e8152.firebaseapp.com",
            databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chat-room-e8152",
            storageBucket: "chat-room-e8152.firebasestorage.app",
            messagingSenderId: "875122406489",
            appId: "1:875122406489:web:c0f66c7a7903b9e87eed48"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('messages');
        const myId = "User-" + Math.floor(Math.random() * 1000);
        document.getElementById("u").value = myId;

        function send() {
            const m = document.getElementById("m").value.trim();
            if(m) {
                db.push({ user: document.getElementById("u").value, text: m, ts: Date.now() });
                document.getElementById("m").value = "";
            }
        }

        document.getElementById("sendBtn").onclick = send;
        document.getElementById("m").onkeypress = (e) => { if(e.key === 'Enter') send(); };

        db.on('child_added', (s) => {
            const d = s.val();
            const div = document.createElement("div");
            div.id = s.key;
            div.className = `msg-wrapper ${d.user === myId ? 'self' : 'other'}`;
            div.innerHTML = `<div class="user-header">${d.user}</div><div class="bubble">${d.text}</div>` +
                (d.user === myId ? `<span onclick="db.child('${s.key}').remove()" style="cursor:pointer; font-size:0.6rem; color:#ffcccc;">Delete</span>` : '');
            const mDiv = document.getElementById("msg");
            mDiv.appendChild(div);
            mDiv.scrollTop = mDiv.scrollHeight;
        });

        db.on('child_removed', (s) => { document.getElementById(s.key)?.remove(); });

        function togglePicker() { const p = document.getElementById('emoji-picker'); p.style.display = (p.style.display === 'grid') ? 'none' : 'grid'; }
        ['😀', '😂', '😍', '😭', '💀', '👍'].forEach(e => {
            const s = document.createElement('span'); s.className = 'emoji-item'; s.innerText = e;
            s.onclick = () => document.getElementById('m').value += e;
            document.getElementById('emoji-picker').appendChild(s);
        });
    } catch (e) { console.error("Initialization Error:", e); }
</script>
</body>
</html>
