<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: sans-serif; 
            /* Fixed mobile background visibility */
            background: #04080e url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; 
        }
        /* Increased transparency for the chatbox */
        #box { 
            width: 95vw; max-width: 500px; height: 90dvh; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            padding: 15px; border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; 
        }
        #msg { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message bubble styles */
        .msg-container { display: flex; width: 100%; }
        .mine { justify-content: flex-end; }
        .theirs { justify-content: flex-start; }
        
        .bubble { 
            padding: 12px 18px; border-radius: 20px; max-width: 80%; 
            font-size: 1.1rem; line-height: 1.4; 
        }
        .mine .bubble { background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: #333; color: white; border-bottom-left-radius: 4px; }
        
        #in { display: flex; gap: 8px; align-items: center; width: 100%; margin-top: 10px; }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 20px; flex-grow: 1; }
        .action-btn { background: transparent; border: none; cursor: pointer; padding: 10px; font-size: 1.3rem; color: white; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg"></div>
    <div id="in">
        <input type="text" id="u" style="width: 70px; flex-grow: 0;">
        <input type="text" id="m" placeholder="Message...">
        <button id="sendBtn" class="action-btn">➤</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8",
        databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-room-e8152"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('messages');
    const myId = "User-" + Math.floor(Math.random() * 1000);
    document.getElementById("u").value = myId;

    function send() {
        const text = document.getElementById("m").value.trim();
        if(text) { db.push({ user: myId, text: text }); document.getElementById("m").value = ""; }
    }
    document.getElementById("sendBtn").onclick = send;

    db.on('child_added', (s) => {
        const d = s.val();
        const isMine = (d.user === myId);
        const div = document.createElement("div");
        div.className = `msg-container ${isMine ? 'mine' : 'theirs'}`;
        div.innerHTML = `<div class="bubble">${d.text}</div>`;
        document.getElementById("msg").appendChild(div);
        document.getElementById("msg").scrollTop = document.getElementById("msg").scrollHeight;
    });
</script>
</body>
</html>
