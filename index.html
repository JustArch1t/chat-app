<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group-Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #04080e; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #box { width: 95%; max-width: 450px; height: 90vh; background: #1a1a1a; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; border: 1px solid #333; }
        #msg-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 10px; }
        
        /* Message Bubbles */
        .bubble-wrapper { display: flex; flex-direction: column; width: 100%; }
        .bubble-wrapper.mine { align-items: flex-end; }
        .bubble { background: #333; color: white; padding: 10px 15px; border-radius: 15px; max-width: 80%; display: flex; flex-direction: column; }
        .mine .bubble { background: #007bff; }
        
        .header { font-size: 0.75rem; color: #ccc; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 10px; }
        .content { font-size: 1rem; line-height: 1.4; word-wrap: break-word; }
        
        /* Input Area */
        #input-area { display: flex; gap: 5px; margin-top: 10px; position: relative; }
        input { background: #444; border: none; color: white; padding: 10px; border-radius: 8px; flex-grow: 1; }
        button { background: #555; border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        
        /* Emoji Popup */
        #emoji-popup { display: none; position: absolute; bottom: 60px; left: 0; background: #222; padding: 10px; border-radius: 10px; grid-template-columns: repeat(5, 1fr); gap: 5px; z-index: 100; cursor: pointer; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="box">
    <div id="msg-container"></div>
    <div id="input-area">
        <input type="text" id="name" placeholder="Name" style="width: 60px; flex-grow: 0;">
        <button id="emojiBtn">😊</button>
        <button id="clearBtn">🗑️</button>
        <input type="text" id="text" placeholder="Message..." autocomplete="off">
        <button id="sendBtn">➤</button>
        
        <div id="emoji-popup">
            <span>😀</span><span>😂</span><span>🤣</span><span>😊</span><span>💀</span>
            <span>😍</span><span>😎</span><span>🤔</span><span>😴</span><span>😭</span>
            <span>😡</span><span>👍</span><span>👎</span><span>🔥</span><span>❤️</span>
            <span>✨</span><span>🎉</span><span>🚀</span><span>💯</span><span>🐱</span>
            <span>🐶</span><span>⚽</span><span>💡</span><span>🍔</span><span>🎮</span>
        </div>
    </div>
</div>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyBXjcr21ZUrF5ty2JKH4BuaLqjHaqHitD8", databaseURL: "https://chat-room-e8152-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-room-e8152" });
    const db = firebase.database().ref('messages');
    
    const msgList = document.getElementById("msg-container");
    const nameInput = document.getElementById("name");
    const textInput = document.getElementById("text");
    const emojiPopup = document.getElementById("emoji-popup");

    nameInput.value = "User-" + Math.floor(Math.random() * 1000);

    // Emoji Logic
    document.getElementById("emojiBtn").onclick = (e) => { e.stopPropagation(); emojiPopup.style.display = (emojiPopup.style.display === "grid" ? "none" : "grid"); };
    emojiPopup.onclick = (e) => { 
        if(e.target.tagName === 'SPAN') { 
            const target = (document.activeElement.tagName === 'INPUT') ? document.activeElement : textInput;
            target.value += e.target.innerText;
            target.focus();
        } 
    };
    document.onclick = () => emojiPopup.style.display = "none";

    // Send Logic
    const send = () => { 
        if(textInput.value.trim()) { 
            db.push({ user: nameInput.value || "Anon", text: textInput.value.trim() }); 
            textInput.value = ""; 
        } 
    };
    document.getElementById("sendBtn").onclick = send;
    textInput.onkeypress = (e) => { if(e.key === "Enter") send(); };
    document.getElementById("clearBtn").onclick = () => { if(confirm("Clear all?")) db.remove(); };

    // Event Delegation: Edit/Delete
    msgList.onclick = (e) => {
        const wrapper = e.target.closest('.bubble-wrapper');
        if(!wrapper) return;
        const key = wrapper.id;
        if(e.target.classList.contains('del')) db.child(key).remove();
        if(e.target.classList.contains('edit')) startEdit(key);
    };

    function startEdit(key) {
        const wrapper = document.getElementById(key);
        const txt = wrapper.querySelector('.content');
        const input = document.createElement('input');
        input.value = txt.innerText;
        input.style.width = "100%";
        wrapper.querySelector('.bubble').replaceChild(input, txt);
        input.focus();

        const save = () => {
            db.child(key).update({ text: input.value });
            wrapper.querySelector('.bubble').replaceChild(txt, input);
        };
        input.onkeydown = (e) => { if(e.key === 'Enter') save(); };
        input.onblur = save;
    }

    db.on('child_added', (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.id = s.key;
        div.className = "bubble-wrapper" + (d.user === nameInput.value ? " mine" : "");
        div.innerHTML = `<div class="bubble"><div class="header"><b>${d.user}</b> ${d.user === nameInput.value ? '<span class="edit" style="cursor:pointer">✎</span> <span class="del" style="cursor:pointer">✖</span>' : ''}</div><div class="content">${d.text}</div></div>`;
        msgList.appendChild(div);
        msgList.scrollTop = msgList.scrollHeight;
    });

    db.on('child_changed', (s) => { document.getElementById(s.key).querySelector('.content').innerText = s.val().text; });
    db.on('child_removed', (s) => document.getElementById(s.key)?.remove());
</script>
</body>
</html>
